<!-- js flatpickr na výber dátumu -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
    // inicializacia kalendara
    flatpickr("#datePicker", {
        dateFormat: "d.m.Y",
        minDate: "today",
        disableMobile: true
    });
    let takenTimes = []; // bude naplnené dynamicky
    flatpickr("#datePicker", {
        dateFormat: "d.m.Y",
        minDate: "today",

        // odstranenie víkendov
        disable: [
            function(date) {
                return (date.getDay() === 0 || date.getDay() === 6); 
            }
        ],

        onChange: function(selectedDates, dateStr) {
            // fetch obsadené časy pre vybraný dátum
            fetch('get_taken_times.php?datum=' + encodeURIComponent(dateStr))
                .then(response => response.json())
                .then(data => {
                    takenTimes = data;
                    updateTimeSelect(takenTimes);
                })
                .catch(error => {
                    console.error('Chyba pri načítaní obsadených časov:', error);
                    takenTimes = [];
                    updateTimeSelect([]);
                });
                timepicker = document.getElementById('timePicker'); // reset výberu času  
                timepicker.disabled = false; // povoliť výber času po výbere dátumu
        }
    });

    // --- UPDATE TIME SELECT ---
    function updateTimeSelect(takenTimes) {
        const select = document.getElementById('timePicker');
        const options = select.options;
        for (let i = 0; i < options.length; i++) {
            const value = options[i].value;
            if (value) { // skip the "Vyberte čas" option
                options[i].disabled = takenTimes.includes(value);
                options[i].style.color = takenTimes.includes(value) ? '#ccc' : '';
            }
        }
    }

</script>
