<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Form</title>
    <link rel="stylesheet" href="style.css">

    <!-- Flatpickr Calendar -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>

<div class="container">
    <h1>Objednávka služby</h1>

    <div class="form-wrapper">

        <!-- LEFT SIDE -->
        <div class="form-section">
            <h2>Vaše údaje</h2>

            <label>Meno a priezvisko</label>
            <input type="text" placeholder="Zadajte meno">

            <label>Email</label>
            <input type="email" placeholder="Zadajte email">

            <label>Telefón</label>
            <input type="text" placeholder="Zadajte telefón">

            <label>Dátum</label>
            <input id="datePicker" type="text" placeholder="Vyberte dátum">

        </div>

        <!-- RIGHT SIDE -->
        <div class="form-section">
            <h2>Výber služby</h2>

            <label>Typ služby</label>
            <select>
                <option>Servis</option>
                <option>Montáž</option>
                <option>Kontrola</option>
            </select>

            <label>Poznámka</label>
            <textarea placeholder="Doplňujúce informácie"></textarea>

            <button class="submit-btn">Odoslať objednávku</button>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="script.js"></script>
</body>
</html>
